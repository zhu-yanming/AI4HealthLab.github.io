<!DOCTYPE html>
<html lang="en">

<script>
  fetch('my_head.html')
    .then(res => res.text())
    .then(data => {
      document.head.innerHTML = data;
    });

<body id="page_top">
  <div class="masthead" style="display: none;"></div>

  <div id="navbar-placeholder"></div>

  <section id="c_hist">
    <div class="container">
      <div class="row">
        <div class="col-lg-12 mx-auto text-left">
          <h2 class="section-heading">Selected Publications (2020 - Present)</h2>
          <!-- <script src="https://bibbase.org/show?bib=https%3A%2F%2Fbibbase.org%2Fnetwork%2Ffiles%2FpoWArwxziyYE68jsz&noBootstrap=1&jsonp=1"></script> -->
          <div id="pubs-container"></div>
                    
        </div>
      </div>
  </section>
  

  <!-- Bootstrap core JavaScript -->
  <script src="vendor/jquery/jquery.min.js"></script>
  <script src="vendor/bootstrap/js/bootstrap.bundle.min.js"></script>

  <!-- Plugin JavaScript -->
  <script src="vendor/jquery-easing/jquery.easing.min.js"></script>
  <script src="vendor/scrollreveal/scrollreveal.min.js"></script>
  <script src="vendor/magnific-popup/jquery.magnific-popup.min.js"></script>

  <!-- Custom scripts for this template -->
  <script src="js/creative.min.js"></script>

  <script>
    fetch("my_navbar.html")
      .then(res => res.text())
      .then(data => {
        document.getElementById("navbar-placeholder").innerHTML = data;
        const currentPage = window.location.pathname.split("/").pop();
        document.querySelectorAll(".nav-link[data-page]").forEach(link => {
          if (link.getAttribute("data-page") === currentPage) {
            link.classList.add("active");
          }
        });
      });
  </script>

  <div id="footer-placeholder"></div>
  <script>
    fetch("my_footer.html")
      .then(res => res.text())
      .then(data => {
        document.getElementById("footer-placeholder").innerHTML = data;
      });
  </script>


<div id="pubs-container"></div>

<script>
fetch('pubs_harvard.html')
  .then(response => response.text())
  .then(html => {
    const tempDiv = document.createElement('div');
    tempDiv.innerHTML = html;

    // 获取所有 .csl-entry 项
    const entries = Array.from(tempDiv.querySelectorAll('.csl-entry'));

    // 提取年份，排序（降序）
    const yearRegex = /\((\d{4})\)/;
    entries.sort((a, b) => {
      const yearA = parseInt((a.innerHTML.match(yearRegex) || [])[1] || '0', 10);
      const yearB = parseInt((b.innerHTML.match(yearRegex) || [])[1] || '0', 10);
      return yearB - yearA; // 降序排序
    });

    // 转换纯文本 https 为可点击链接
    entries.forEach(entry => {
      entry.innerHTML = entry.innerHTML.replace(
        /(https?:\/\/[^\s<>"]+)/g,
        '<a href="$1" target="_blank" rel="noopener noreferrer">$1</a>'
      );
    });

    // 插入排序后条目
    const container = document.getElementById('pubs-container');
    entries.forEach(entry => container.appendChild(entry));
  })
  .catch(err => console.error('Failed to load pubs.html:', err));
</script>


</body>

</html>
